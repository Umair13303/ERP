name: Build and Deploy to MonsterASP

on:
  push:
    branches: [ main ]

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish App
        # This compiles your raw code into the 'publish-out' folder
        run: dotnet publish -c Release -o ./publish-out

      - name: Stop Application
        # This creates the 'kill switch' file to unlock the DLLs on the server
        run: |
          echo "Site is updating, please wait..." > ./publish-out/app_offline.htm

      - name: Purge Remote wwwroot Directory
        # This connects via FTP and forcefully deletes everything inside /wwwroot before the upload
        uses: charliealbright/ftp-action@v1
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          commands: |
            cd /wwwroot
            rm -rf *

      - name: Upload to MonsterASP via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish-out/
          server-dir: /wwwroot/
          dangerous-clean-slate: true

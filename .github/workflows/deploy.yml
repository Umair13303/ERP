name: Build and Deploy to MonsterASP
on:
  push:
    branches: [ main ]

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish App
        # This compiles your application into the 'publish-out' folder
        run: dotnet publish -c Release -o ./publish-out

      - name: Deploy via WebDeploy
        # This pushes the compiled package securely using your publish profile secret
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'site71747'
          publish-profile: ${{ secrets.WEBDEPLOY_PUBLISH_PROFILE }}
          package: ./publish-out

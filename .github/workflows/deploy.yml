name: Build and Deploy to MonsterASP
on:
  push:
    branches: [ main ]

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish App
        # This compiles your raw code into the runnable 'publish-out' folder
        run: dotnet publish -c Release -o ./publish-out

      - name: Upload to MonsterASP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish-out/
          server-dir: /wwwroot/
          # This force-clears the 'locked' files that caused the 550 error
          dangerous-clean-slate: true

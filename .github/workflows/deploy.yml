
name: Build and Deploy to MonsterASP
on:
  push:
    branches: [ main ]

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish App
        # This compiles your raw code into the 'publish-out' folder
        run: dotnet publish -c Release -o ./publish-out

      - name: Stop Application
        # This creates the 'kill switch' file to unlock the DLLs on the server
        run: |
          echo "Site is updating, please wait..." > ./publish-out/app_offline.htm

      - name: Upload to MonsterASP via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish-out/
          server-dir: /wwwroot/
          # This deletes old files and replaces them with the new ones
          dangerous-clean-slate: true

      # NOTE: The app_offline.htm file is uploaded in the step above. 
      # ASP.NET Core will automatically restart once you delete that file 
      # or simply overwrite it in your next push.
